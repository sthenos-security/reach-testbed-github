# REACHABLE Security Scan — GitHub Actions
#
# One job. One command. All scanners run concurrently in a single process.
# Typical runtime: 60–90s on a 2-core managed runner.
#
# ── Setup ─────────────────────────────────────────────────────────────
# 1. Fork this repo
# 2. Push — pipeline runs automatically
# 3. Optional: Add GROQ_API_KEY as a repo secret for AI reachability
#
# ── Repo variables (Settings → Secrets and variables → Actions) ──────
#   REACHABLE_DIST_REPO  — dist repo  (default: sthenos-security/reach-dist)
#   REACHABLE_VERSION    — pin version (default: latest)
#   FAIL_THRESHOLD       — critical | high | medium | any | none  (default: high)
#   RUNNER_LABEL         — self-hosted runner label  (default: ubuntu-latest)
#
# ── AI Reachability (optional) ───────────────────────────────────────
#   Add GROQ_API_KEY as a repo secret → AI analysis runs automatically.
#   No key → scan still works, just without variable-level taint analysis.
#   Get a free key: https://console.groq.com/keys

name: REACHABLE Security Scan

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  REACHABLE_DIST_REPO: ${{ vars.REACHABLE_DIST_REPO || 'sthenos-security/reach-dist' }}
  REACHABLE_VERSION:   ${{ vars.REACHABLE_VERSION   || '' }}
  FAIL_THRESHOLD:      ${{ vars.FAIL_THRESHOLD      || 'high' }}

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: REACHABLE Security Scan
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install REACHABLE
        run: |
          ARGS=()
          [[ -n "$REACHABLE_VERSION" ]] && ARGS=(--version "$REACHABLE_VERSION")
          curl -fsSL "https://raw.githubusercontent.com/${REACHABLE_DIST_REPO}/main/install.sh" | bash -s -- "${ARGS[@]}"
          reachctl version

      - name: Scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SCAN_FLAGS="--ci --fail-on $FAIL_THRESHOLD --sarif reachable.sarif"

          # Auto-enable AI reachability if key is available
          if [ -n "$GROQ_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ]; then
            SCAN_FLAGS="$SCAN_FLAGS --ai-enhance"
            echo "::notice::AI reachability enabled — variable-level taint analysis active"
          fi

          reachctl scan . $SCAN_FLAGS

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reachable-dashboard
          path: ~/.reachable/scans/**/dashboard/
          retention-days: 30

      - name: Upload SARIF to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reachable.sarif
        continue-on-error: true

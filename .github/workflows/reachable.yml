# REACHABLE Security Scan — GitHub Actions
#
# One job. One command. All scanners run concurrently in a single process.
# Typical runtime: 60–90s on a 2-core managed runner.
#
# ── Setup ─────────────────────────────────────────────────────────────
# 1. Fork this repo
# 2. Push — pipeline runs automatically
# 3. Optional: Add an AI provider key as a repo secret for AI reachability
#
# ── Repo variables (Settings → Secrets and variables → Actions) ──────
#   REACHABLE_DIST_REPO  — dist repo  (default: sthenos-security/reach-dist)
#   REACHABLE_VERSION    — pin version (default: latest)
#   FAIL_THRESHOLD       — critical | high | medium | any | none  (default: high)
#   RUNNER_LABEL         — self-hosted runner label  (default: ubuntu-latest)
#
# ── AI Reachability (optional) ──────────────────────────────────────
#   Add ONE of the following as a repo secret:
#     OPENROUTER_API_KEY  — Recommended: single key, 300+ models (openrouter.ai)
#     ANTHROPIC_API_KEY   — Claude (highest accuracy)
#     GROQ_API_KEY        — Groq (fast, low cost, free tier)
#     OPENAI_API_KEY      — OpenAI GPT-4o
#   AI reachability runs automatically when any key is detected.
#   No key → scan still works, without AI taint verification.

name: REACHABLE Security Scan

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  REACHABLE_DIST_REPO: ${{ vars.REACHABLE_DIST_REPO || 'sthenos-security/reach-dist' }}
  REACHABLE_VERSION:   ${{ vars.REACHABLE_VERSION   || '' }}
  FAIL_THRESHOLD:      ${{ vars.FAIL_THRESHOLD      || 'high' }}

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: REACHABLE Security Scan
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache REACHABLE data
        uses: actions/cache@v5
        with:
          path: ~/.reachable
          key: reachable-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/package-lock.json', '**/go.sum') }}
          restore-keys: reachable-${{ runner.os }}-

      - name: Install REACHABLE
        run: |
          ARGS=()
          [[ -n "$REACHABLE_VERSION" ]] && ARGS=(--version "$REACHABLE_VERSION")
          curl -fsSL "https://raw.githubusercontent.com/${REACHABLE_DIST_REPO}/main/install.sh" | bash -s -- "${ARGS[@]}"
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          reachctl version

      - name: Scan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export PATH="$HOME/.reachable/venv/bin:$HOME/.reachable/tools/bin:$PATH"
          reachctl scan . --ci --fail-on $FAIL_THRESHOLD --sarif reachable.sarif

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reachable-dashboard
          path: ~/.reachable/scans/**/dashboard/
          retention-days: 30

      - name: Upload SARIF to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reachable.sarif
        continue-on-error: true
